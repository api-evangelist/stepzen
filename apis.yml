aid: stepzen
name: StepZen
description: >-
  StepZen (now IBM API Connect Essentials) is a GraphQL-as-a-Service platform
  that enables developers to build, deploy, and manage GraphQL APIs by connecting
  to multiple backends including REST APIs, SQL databases, NoSQL databases,
  GraphQL endpoints, and SOAP services. APIs are defined declaratively using
  GraphQL SDL with custom directives like @rest and @dbquery. StepZen runs a
  high-performance in-memory Golang GraphQL engine deployed on Kubernetes,
  optimizing queries at runtime for low latency and high throughput.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Backend Integration
  - GraphQL
  - API Gateway
  - REST to GraphQL
  - IBM
  - Data Federation
url: >-
  https://raw.githubusercontent.com/api-evangelist/stepzen/refs/heads/main/apis.yml
